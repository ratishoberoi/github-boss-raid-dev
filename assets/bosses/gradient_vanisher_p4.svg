    <path class="drift" d="M460 56C292 150 280 374 478 516C516 448 598 318 568 184C546 102 488 72 460 56Z" fill="#7a5cff" fill-opacity="0.305" stroke="#ff2bd6" stroke-opacity="0.305" stroke-width="3"/>
    <path class="drift" d="M500 56C292 150 280 374 518 516C516 448 598 318 568 184C546 102 488 72 500 56Z" fill="#b8f7ff" fill-opacity="0.26" stroke="#ff2bd6" stroke-opacity="0.26" stroke-width="3"/>
    <path class="drift" d="M540 56C292 150 280 374 558 516C516 448 598 318 568 184C546 102 488 72 540 56Z" fill="#7a5cff" fill-opacity="0.21500000000000002" stroke="#ff2bd6" stroke-opacity="0.21500000000000002" stroke-width="3"/>
    <path class="drift" d="M580 56C292 150 280 374 598 516C516 448 598 318 568 184C546 102 488 72 580 56Z" fill="#b8f7ff" fill-opacity="0.16999999999999998" stroke="#ff2bd6" stroke-opacity="0.16999999999999998" stroke-width="3"/>
    <path class="drift" d="M620 56C292 150 280 374 638 516C516 448 598 318 568 184C546 102 488 72 620 56Z" fill="#7a5cff" fill-opacity="0.125" stroke="#ff2bd6" stroke-opacity="0.125" stroke-width="3"/>
    <path class="pulse" d="M454 48C306 154 294 384 454 526C548 450 638 320 606 180C580 94 526 62 454 48Z" fill="#060914" fill-opacity=".28" stroke="#b8f7ff" stroke-width="12"/>
    <path d="M350 218C428 138 552 144 628 236C546 202 430 204 350 218Z" fill="#7a5cff" fill-opacity=".22" stroke="#7a5cff" stroke-width="7"/>
    <path class="pulse" d="M424 250L466 224L452 282ZM538 254L586 228L558 288Z" fill="#ff2bd6"/>
    <path d="M380 386C460 440 552 424 622 360" stroke="#b8f7ff" stroke-width="9" fill="none"/>
    <path d="M392 164L504 206L434 278L556 330L452 394L540 476" stroke="#020409" stroke-width="58" stroke-linecap="round" fill="none"/>
    <path class="flow" d="M170 120L812 462M848 94L128 474M314 36L642 520" stroke="#7a5cff" stroke-width="10" stroke-dasharray="12 20"/>
    <path class="shake" d="M182 72C344 148 626 130 806 54C694 224 720 384 846 512C614 440 350 462 132 522C260 356 270 220 182 72Z" fill="#b8f7ff" fill-opacity=".10" stroke="#ff2bd6" stroke-width="7"/>
  </g>
  </g>
  <g filter="url(#glow)">
    <path d="M36 42H174L208 76H36Z" fill="#020713" fill-opacity=".82" stroke="#b8f7ff" stroke-width="2"/>
    <text x="58" y="67" fill="#ff2bd6" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="22" font-weight="900">PHASE 4</text>
  </g>
</svg>
