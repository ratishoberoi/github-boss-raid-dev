<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">The Overfitted Beast Contained Beast</title>
  <desc id="desc">Normal form: a chained beast covered in neat dataset labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050b14"/>
      <stop offset=".48" stop-color="#12051c"/>
      <stop offset="1" stop-color="#061b22"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="46%" r="50%">
      <stop offset="0" stop-color="#ff3b6b" stop-opacity=".32"/>
      <stop offset=".45" stop-color="#ffe95e" stop-opacity=".16"/>
      <stop offset="1" stop-color="#020713" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan" width="9" height="9" patternUnits="userSpaceOnUse">
      <path d="M0 0H9" stroke="#ff3b6b" stroke-opacity=".08"/>
    </pattern>
    <filter id="phaseImage">
      <feColorMatrix type="saturate" values="1.22"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="1.06"/>
        <feFuncG type="linear" slope="1.02"/>
        <feFuncB type="linear" slope="1.04"/>
      </feComponentTransfer>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulseGlow { 0%,100% { opacity: .46; } 50% { opacity: 1; } }
      @keyframes energyMove { to { stroke-dashoffset: -260; transform: translateX(34px); } }
      @keyframes scanMove { 0% { transform: translateY(-540px); } 100% { transform: translateY(540px); } }
      @keyframes reactorFlicker { 0%,100% { opacity: .34; transform: scale(.94); } 40% { opacity: .92; transform: scale(1.08); } 70% { opacity: .58; transform: scale(1.02); } }
      @keyframes corruptionPulse { 0%,100% { opacity: .22; } 50% { opacity: .78; } }
      @keyframes eyeGlowPulse { 0%,100% { opacity: .56; } 50% { opacity: 1; } }
      @keyframes threatPulse { 0%,100% { opacity: .52; } 50% { opacity: 1; } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes sweep { 0% { transform: translateX(-960px); } 100% { transform: translateX(960px); } }
      .pulsing-glow { animation: pulseGlow 2.1799999999999997s ease-in-out infinite; }
      .energy-movement { animation: energyMove 4.92s linear infinite; }
      .scanline-movement { animation: scanMove 5.45s linear infinite; }
      .reactor-flicker { transform-box: fill-box; transform-origin: center; animation: reactorFlicker 1.62s steps(3,end) infinite; }
      .corruption-pulse { animation: corruptionPulse 2.5799999999999996s ease-in-out infinite; }
      .eye-glow-pulse { animation: eyeGlowPulse 1.8800000000000001s ease-in-out infinite; }
      .threat-indicator-pulse { animation: threatPulse 1.72s ease-in-out infinite; }
      .spin { transform-origin: 480px 270px; animation: spin 12s linear infinite; }
      .sweep { animation: sweep 5.6s linear infinite; }
    </style>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <image href="../master_boss_art/overfitted_beast_master.png" x="0" y="0" width="960" height="540" preserveAspectRatio="xMidYMid slice" filter="url(#phaseImage)"/>
  <rect width="960" height="540" fill="url(#core)" opacity="0.34"/>
  <rect class="corruption-pulse" width="960" height="540" fill="#ffe95e" fill-opacity=".04"/>
  <rect width="960" height="540" fill="url(#scan)"/>
  <rect class="scanline-movement" x="0" y="-540" width="960" height="86" fill="#ff3b6b" fill-opacity=".10"/>
  <rect class="sweep" x="0" y="0" width="166" height="540" fill="#ff3b6b" fill-opacity=".045"/>
  <path class="spin" d="M84 270C204 32 756 32 876 270C756 508 204 508 84 270Z" stroke="#ffe95e" stroke-opacity=".16" stroke-width="4" stroke-dasharray="26 18" fill="none"/>
  <g filter="url(#heavyGlow)">
    <path class="energy-movement" d="M-40 80C160 10 330 164 520 80C710 -4 850 148 1000 52" stroke="#23f7dd" stroke-opacity=".42" stroke-width="3" stroke-linecap="round" stroke-dasharray="30 24" fill="none"/>
    <path class="energy-movement" d="M-40 270C160 200 330 354 520 270C710 186 850 338 1000 242" stroke="#23f7dd" stroke-opacity=".42" stroke-width="4" stroke-linecap="round" stroke-dasharray="30 24" fill="none"/>
    <path class="energy-movement" d="M-40 460C160 390 330 544 520 460C710 376 850 528 1000 432" stroke="#23f7dd" stroke-opacity=".42" stroke-width="5" stroke-linecap="round" stroke-dasharray="30 24" fill="none"/>
    <path class="corruption-pulse" d="M80 70L104 104L88 142L126 188" stroke="#ffe95e" stroke-opacity=".42" stroke-width="2" fill="none"/>
    <path class="corruption-pulse" d="M217 153L241 187L225 225L263 271" stroke="#ffe95e" stroke-opacity=".42" stroke-width="3" fill="none"/>
    <path class="corruption-pulse" d="M354 236L378 270L362 308L400 354" stroke="#ffe95e" stroke-opacity=".42" stroke-width="4" fill="none"/>
    <path class="corruption-pulse" d="M491 319L515 353L499 391L537 437" stroke="#ffe95e" stroke-opacity=".42" stroke-width="2" fill="none"/>
    <circle class="pulsing-glow" cx="482" cy="292" r="140" fill="#23f7dd" fill-opacity=".12" filter="url(#glow)"/>
    <circle class="eye-glow-pulse" cx="438" cy="226" r="8" fill="#23f7dd" fill-opacity=".86" filter="url(#glow)"/>
    <circle class="eye-glow-pulse" cx="522" cy="226" r="8" fill="#23f7dd" fill-opacity=".86" filter="url(#glow)"/>
    <circle class="reactor-flicker" cx="482" cy="292" r="48" fill="#ff3b6b" fill-opacity="0.16999999999999998" filter="url(#glow)"/>
    <circle class="corruption-pulse" cx="482" cy="292" r="98" stroke="#ffe95e" stroke-opacity="0.27" stroke-width="7" fill="none"/>
    <path class="threat-indicator-pulse" d="M36 42H214L250 78H36Z" fill="#020713" fill-opacity=".78" stroke="#ff3b6b" stroke-width="2"/>
    <path class="corruption-pulse" d="M70 42L138 162L188 320" stroke="#ffe95e" stroke-opacity=".76" stroke-width="9" stroke-dasharray="10 10" fill="none"/>
    <path class="corruption-pulse" d="M208 42L276 162L326 320" stroke="#ffe95e" stroke-opacity=".76" stroke-width="9" stroke-dasharray="10 10" fill="none"/>
    <path class="corruption-pulse" d="M346 42L414 162L464 320" stroke="#ffe95e" stroke-opacity=".76" stroke-width="9" stroke-dasharray="10 10" fill="none"/>
    <path class="corruption-pulse" d="M484 42L552 162L602 320" stroke="#ffe95e" stroke-opacity=".76" stroke-width="9" stroke-dasharray="10 10" fill="none"/>
    <path class="corruption-pulse" d="M622 42L690 162L740 320" stroke="#ffe95e" stroke-opacity=".76" stroke-width="9" stroke-dasharray="10 10" fill="none"/>
    <path class="corruption-pulse" d="M760 42L828 162L878 320" stroke="#ffe95e" stroke-opacity=".76" stroke-width="9" stroke-dasharray="10 10" fill="none"/>
    <path class="corruption-pulse" d="M898 42L966 162L1016 320" stroke="#ffe95e" stroke-opacity=".76" stroke-width="9" stroke-dasharray="10 10" fill="none"/>
    <path class="corruption-pulse" d="M112 118L158 94L194 152L128 176Z" fill="#ff3b6b" fill-opacity=".18" stroke="#23f7dd" stroke-width="3"/>
    <path class="corruption-pulse" d="M221 189L267 165L303 223L237 247Z" fill="#ff3b6b" fill-opacity=".18" stroke="#23f7dd" stroke-width="3"/>
    <path class="corruption-pulse" d="M330 260L376 236L412 294L346 318Z" fill="#ff3b6b" fill-opacity=".18" stroke="#23f7dd" stroke-width="3"/>
    <path class="corruption-pulse" d="M439 331L485 307L521 365L455 389Z" fill="#ff3b6b" fill-opacity=".18" stroke="#23f7dd" stroke-width="3"/>
    <path class="corruption-pulse" d="M548 402L594 378L630 436L564 460Z" fill="#ff3b6b" fill-opacity=".18" stroke="#23f7dd" stroke-width="3"/>
    <path class="corruption-pulse" d="M657 143L703 119L739 177L673 201Z" fill="#ff3b6b" fill-opacity=".18" stroke="#23f7dd" stroke-width="3"/>
    <path class="threat-indicator-pulse" d="M80 478C264 406 700 402 886 474" stroke="#ff3b6b" stroke-width="15" stroke-opacity=".45" fill="none"/>
    
  </g>
  <g filter="url(#glow)">
    <text x="58" y="66" fill="#23f7dd" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="900">PHASE 1</text>
    <text x="58" y="92" fill="#f7fbff" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="900">Contained Beast</text>
    <circle class="threat-indicator-pulse" cx="902" cy="58" r="19" fill="#ff3b6b" filter="url(#glow)"/>
  </g>
</svg>
