<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">The GPU Devourer World Eater</title>
  <desc id="desc">Final Nightmare form: a starved compute singularity with an endless reactor mouth.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050b14"/>
      <stop offset=".48" stop-color="#12051c"/>
      <stop offset="1" stop-color="#061b22"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="46%" r="50%">
      <stop offset="0" stop-color="#ff6b1a" stop-opacity=".32"/>
      <stop offset=".45" stop-color="#ffe95e" stop-opacity=".16"/>
      <stop offset="1" stop-color="#020713" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan" width="9" height="9" patternUnits="userSpaceOnUse">
      <path d="M0 0H9" stroke="#ff6b1a" stroke-opacity=".08"/>
    </pattern>
    <filter id="phaseImage">
      <feColorMatrix type="saturate" values="1.88"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="1.24"/>
        <feFuncG type="linear" slope="1.08"/>
        <feFuncB type="linear" slope="1.16"/>
      </feComponentTransfer>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulseGlow { 0%,100% { opacity: .46; } 50% { opacity: 1; } }
      @keyframes energyMove { to { stroke-dashoffset: -260; transform: translateX(34px); } }
      @keyframes scanMove { 0% { transform: translateY(-540px); } 100% { transform: translateY(540px); } }
      @keyframes reactorFlicker { 0%,100% { opacity: .34; transform: scale(.94); } 40% { opacity: .92; transform: scale(1.08); } 70% { opacity: .58; transform: scale(1.02); } }
      @keyframes corruptionPulse { 0%,100% { opacity: .22; } 50% { opacity: .78; } }
      @keyframes eyeGlowPulse { 0%,100% { opacity: .56; } 50% { opacity: 1; } }
      @keyframes threatPulse { 0%,100% { opacity: .52; } 50% { opacity: 1; } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes sweep { 0% { transform: translateX(-960px); } 100% { transform: translateX(960px); } }
      .pulsing-glow { animation: pulseGlow 1.52s ease-in-out infinite; }
      .energy-movement { animation: energyMove 3.4800000000000004s linear infinite; }
      .scanline-movement { animation: scanMove 4.4s linear infinite; }
      .reactor-flicker { transform-box: fill-box; transform-origin: center; animation: reactorFlicker 1.08s steps(3,end) infinite; }
      .corruption-pulse { animation: corruptionPulse 1.92s ease-in-out infinite; }
      .eye-glow-pulse { animation: eyeGlowPulse 1.2200000000000002s ease-in-out infinite; }
      .threat-indicator-pulse { animation: threatPulse 1.18s ease-in-out infinite; }
      .spin { transform-origin: 480px 270px; animation: spin 6s linear infinite; }
      .sweep { animation: sweep 4.4s linear infinite; }
    </style>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <image href="../master_boss_art/gpu_devourer_master.png" x="-50" y="-28" width="1061" height="597" preserveAspectRatio="xMidYMid slice" filter="url(#phaseImage)"/>
  <rect width="960" height="540" fill="url(#core)" opacity="0.5800000000000001"/>
  <rect class="corruption-pulse" width="960" height="540" fill="#ffe95e" fill-opacity=".12"/>
  <rect width="960" height="540" fill="url(#scan)"/>
  <rect class="scanline-movement" x="0" y="-540" width="960" height="86" fill="#ff6b1a" fill-opacity=".10"/>
  <rect class="sweep" x="0" y="0" width="304" height="540" fill="#ff6b1a" fill-opacity=".045"/>
  <path class="spin" d="M84 270C204 32 756 32 876 270C756 508 204 508 84 270Z" stroke="#ffe95e" stroke-opacity=".16" stroke-width="7" stroke-dasharray="26 18" fill="none"/>
  <g filter="url(#heavyGlow)">
    <path class="energy-movement" d="M-40 80C160 10 330 164 520 80C710 -4 850 148 1000 52" stroke="#23f7dd" stroke-opacity=".42" stroke-width="3" stroke-linecap="round" stroke-dasharray="30 24" fill="none"/>
    <path class="energy-movement" d="M-40 156C160 86 330 240 520 156C710 72 850 224 1000 128" stroke="#23f7dd" stroke-opacity=".42" stroke-width="4" stroke-linecap="round" stroke-dasharray="30 24" fill="none"/>
    <path class="energy-movement" d="M-40 232C160 162 330 316 520 232C710 148 850 300 1000 204" stroke="#23f7dd" stroke-opacity=".42" stroke-width="5" stroke-linecap="round" stroke-dasharray="30 24" fill="none"/>
    <path class="energy-movement" d="M-40 308C160 238 330 392 520 308C710 224 850 376 1000 280" stroke="#23f7dd" stroke-opacity=".42" stroke-width="6" stroke-linecap="round" stroke-dasharray="30 24" fill="none"/>
    <path class="energy-movement" d="M-40 384C160 314 330 468 520 384C710 300 850 452 1000 356" stroke="#23f7dd" stroke-opacity=".42" stroke-width="3" stroke-linecap="round" stroke-dasharray="30 24" fill="none"/>
    <path class="energy-movement" d="M-40 460C160 390 330 544 520 460C710 376 850 528 1000 432" stroke="#23f7dd" stroke-opacity=".42" stroke-width="4" stroke-linecap="round" stroke-dasharray="30 24" fill="none"/>
    <path class="corruption-pulse" d="M80 70L104 104L88 142L126 188" stroke="#ffe95e" stroke-opacity=".42" stroke-width="2" fill="none"/>
    <path class="corruption-pulse" d="M217 153L241 187L225 225L263 271" stroke="#ffe95e" stroke-opacity=".42" stroke-width="3" fill="none"/>
    <path class="corruption-pulse" d="M354 236L378 270L362 308L400 354" stroke="#ffe95e" stroke-opacity=".42" stroke-width="4" fill="none"/>
    <path class="corruption-pulse" d="M491 319L515 353L499 391L537 437" stroke="#ffe95e" stroke-opacity=".42" stroke-width="2" fill="none"/>
    <path class="corruption-pulse" d="M628 402L652 436L636 474L674 520" stroke="#ffe95e" stroke-opacity=".42" stroke-width="3" fill="none"/>
    <path class="corruption-pulse" d="M765 105L789 139L773 177L811 223" stroke="#ffe95e" stroke-opacity=".42" stroke-width="4" fill="none"/>
    <path class="corruption-pulse" d="M112 188L136 222L120 260L158 306" stroke="#ffe95e" stroke-opacity=".42" stroke-width="2" fill="none"/>
    <path class="corruption-pulse" d="M249 271L273 305L257 343L295 389" stroke="#ffe95e" stroke-opacity=".42" stroke-width="3" fill="none"/>
    <path class="corruption-pulse" d="M386 354L410 388L394 426L432 472" stroke="#ffe95e" stroke-opacity=".42" stroke-width="4" fill="none"/>
    <path class="corruption-pulse" d="M523 437L547 471L531 509L569 555" stroke="#ffe95e" stroke-opacity=".42" stroke-width="2" fill="none"/>
    <path class="corruption-pulse" d="M660 140L684 174L668 212L706 258" stroke="#ffe95e" stroke-opacity=".42" stroke-width="3" fill="none"/>
    <path class="corruption-pulse" d="M797 223L821 257L805 295L843 341" stroke="#ffe95e" stroke-opacity=".42" stroke-width="4" fill="none"/>
    <path class="corruption-pulse" d="M144 306L168 340L152 378L190 424" stroke="#ffe95e" stroke-opacity=".42" stroke-width="2" fill="none"/>
    <path class="corruption-pulse" d="M281 389L305 423L289 461L327 507" stroke="#ffe95e" stroke-opacity=".42" stroke-width="3" fill="none"/>
    <path class="corruption-pulse" d="M418 92L442 126L426 164L464 210" stroke="#ffe95e" stroke-opacity=".42" stroke-width="4" fill="none"/>
    <path class="corruption-pulse" d="M555 175L579 209L563 247L601 293" stroke="#ffe95e" stroke-opacity=".42" stroke-width="2" fill="none"/>
    <circle class="pulsing-glow" cx="482" cy="292" r="194" fill="#23f7dd" fill-opacity=".12" filter="url(#glow)"/>
    <circle class="eye-glow-pulse" cx="438" cy="226" r="11" fill="#23f7dd" fill-opacity=".86" filter="url(#glow)"/>
    <circle class="eye-glow-pulse" cx="522" cy="226" r="11" fill="#23f7dd" fill-opacity=".86" filter="url(#glow)"/>
    <circle class="reactor-flicker" cx="482" cy="292" r="90" fill="#ff6b1a" fill-opacity="0.32" filter="url(#glow)"/>
    <circle class="corruption-pulse" cx="482" cy="292" r="164" stroke="#ffe95e" stroke-opacity="0.60" stroke-width="10" fill="none"/>
    <path class="threat-indicator-pulse" d="M36 42H214L250 78H36Z" fill="#020713" fill-opacity=".78" stroke="#ff6b1a" stroke-width="2"/>
    <circle class="reactor-flicker" cx="496" cy="300" r="132" fill="#ff6b1a" fill-opacity=".44" filter="url(#glow)"/>
    <path class="eye-glow-pulse" d="M670 206C748 100 842 156 924 250C842 346 750 398 670 300Z" fill="#050407" fill-opacity=".34" stroke="#ffe95e" stroke-width="7"/>
    <path class="energy-movement" d="M498 300C430 396 386 438 338 524M512 302C604 392 668 444 762 536" stroke="#ff6b1a" stroke-width="13" stroke-dasharray="22 16" fill="none"/>
    <path d="M34 502H928" stroke="#ff6b1a" stroke-width="18" stroke-opacity=".34"/><path d="M70 500V448M132 500V414M206 500V456M772 500V422M846 500V392M908 500V450" stroke="#ffe95e" stroke-width="12" stroke-opacity=".54"/>
    <circle class="reactor-flicker" cx="842" cy="252" r="126" fill="#ff6b1a" fill-opacity=".20" filter="url(#glow)"/><circle class="threat-indicator-pulse" cx="842" cy="252" r="172" stroke="#ffe95e" stroke-width="9" stroke-opacity=".34" fill="none"/>
  </g>
  <g filter="url(#glow)">
    <text x="58" y="66" fill="#23f7dd" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="900">PHASE 4</text>
    <text x="58" y="92" fill="#f7fbff" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="900">World Eater</text>
    <circle class="threat-indicator-pulse" cx="902" cy="58" r="28" fill="#ff6b1a" filter="url(#glow)"/>
  </g>
</svg>
